name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;34.0.0'
    
    - name: Install dependencies
      run: |
        npm install --force
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets --force
    
    - name: Remove existing Android folder
      run: rm -rf android
    
    - name: Initialize Capacitor
      run: |
        npx cap init "Chromium E621" "com.chromium.e621.client" --web-dir=www
        npx cap add android
    
    - name: Generate icons
      run: |
        mkdir -p assets
        if [ -f "assets/icon-512.png" ]; then
          cp assets/icon-512.png assets/icon-only.png
        elif [ -f "icon-512.png" ]; then
          cp icon-512.png assets/icon-only.png
        else
          echo "No icon found!"
          exit 1
        fi
        npm install sharp --force
        npx @capacitor/assets generate --android
    
    - name: Fix manifest
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's|<application|<application android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round"|g' "$MANIFEST"
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Sign APK
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > release-key.jks
        /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk
        /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks release-key.jks --ks-pass pass:"$KEYSTORE_PASSWORD" --key-pass pass:"$KEYSTORE_PASSWORD" --ks-key-alias "$KEY_ALIAS" --out app.apk aligned.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: chromium-e621-release-apk
        path: app.apk
        retention-days: 30
