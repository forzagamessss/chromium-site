name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;34.0.0'
    
    - name: Clean install dependencies
      run: |
        echo "=== Removing old node_modules ==="
        rm -rf node_modules package-lock.json
        echo "=== Installing dependencies ==="
        npm install --force
      shell: bash
    
    - name: Install Capacitor & Assets tool
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets --force
    
    - name: Remove existing Android folder
      run: |
        echo "=== Removing existing android folder to avoid conflicts ==="
        rm -rf android
    
    - name: Initialize and Build Android Project
      run: |
        npx cap init "Chromium E621" "com.chromium.e621.client" --web-dir=www
        npx cap add android
        
    - name: Generate App Icons (No White Background)
      run: |
        echo "=== Preparing Assets Directory ==="
        mkdir -p assets
        
        echo "=== Checking for icon source ==="
        if [ -f "icon-512.png" ]; then
          cp icon-512.png assets/icon-only.png
          echo "✅ Found icon-512.png in root and copied to assets/icon-only.png"
        elif [ -f "assets/icon-512.png" ]; then
          cp assets/icon-512.png assets/icon-only.png
          echo "✅ Copied from assets/icon-512.png to assets/icon-only.png"
        elif [ -f "assets/icon.png" ]; then
          cp assets/icon.png assets/icon-only.png
          echo "✅ Copied from assets/icon.png to assets/icon-only.png"
        else
          echo "❌ ERROR: No icon source file found (checked icon-512.png in root and assets/)"
          exit 1
        fi
        
        echo "=== Installing sharp for image processing ==="
        npm install sharp --force
        
        echo "=== Generating icons WITH transparent background ==="
        # Указываем точный путь к иконке и задаем прозрачный фон для адаптивных иконок
        npx @capacitor/assets generate --android --icon-only-path assets/icon-only.png --iconBackgroundColor transparent

    - name: Sync Capacitor
      run: |
        npx cap sync android
    
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace

    - name: Sign Release APK Manually
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      run: |
        echo "=== Расшифровка Keystore ==="
        echo "$KEYSTORE_BASE64" | base64 --decode > release-key.jks
        
        echo "=== Выравнивание APK (zipalign) ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk ready-aligned.apk
        
        echo "=== Подписание APK через apksigner ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks release-key.jks --ks-pass pass:"$KEYSTORE_PASSWORD" --key-pass pass:"$KEYSTORE_PASSWORD" --ks-key-alias "$KEY_ALIAS" --out chromium-e621-app.apk ready-aligned.apk
        
        echo "=== Проверка подписи ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner verify chromium-e621-app.apk
    
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: chromium-e621-release-apk
        path: chromium-e621-app.apk
        retention-days: 30
