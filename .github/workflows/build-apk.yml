name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Используем основную версию v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4  # Используем основную версию v4
      with:
        node-version: '20'
    
    - name: Setup Java
      uses: actions/setup-java@v4  # Используем основную версию v4 (НЕ v4.9.0)
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3  # Используем основную версию v3 (НЕ v3.3.0)
    
    - name: Clean install dependencies
      run: |
        echo "=== Node version ==="
        node --version
        echo "=== NPM version ==="
        npm --version
        echo "=== Current directory ==="
        pwd
        echo "=== Directory contents ==="
        ls -la
        echo "=== Removing old node_modules ==="
        rm -rf node_modules package-lock.json
        echo "=== Installing dependencies ==="
        npm install --force --loglevel=verbose
      shell: bash
    
    - name: Install Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android --force
    
    - name: Build Android project
      run: |
        npx cap init "Chromium E621" "com.chromium.e621.client" --web-dir=www
        npx cap add android
        npx cap sync android
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4  # Используем основную версию v4
      with:
        name: chromium-e621-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
