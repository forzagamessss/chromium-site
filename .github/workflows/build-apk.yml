name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;34.0.0'
    
    - name: Clean install dependencies
      run: |
        echo "=== Removing old node_modules ==="
        rm -rf node_modules package-lock.json
        echo "=== Installing dependencies ==="
        npm install --force
      shell: bash
    
    - name: Install Capacitor & Assets tool
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets --force
    
    - name: Remove existing Android folder
      run: |
        echo "=== Removing existing android folder to avoid conflicts ==="
        rm -rf android
    
    - name: Initialize and Build Android Project
      run: |
        npx cap init "Chromium E621" "com.chromium.e621.client" --web-dir=www
        npx cap add android
        
    - name: Generate App Icons
      run: |
        echo "=== Preparing Assets Directory ==="
        mkdir -p assets
        
        echo "=== Checking for icon source ==="
        if [ -f "icon-512.png" ]; then
          cp icon-512.png assets/icon-only.png
          echo "✅ Found icon-512.png in root"
        elif [ -f "assets/icon-512.png" ]; then
          cp assets/icon-512.png assets/icon-only.png
          echo "✅ Found assets/icon-512.png"
        else
          echo "❌ ERROR: No icon source file found"
          exit 1
        fi
        
        echo "=== Installing sharp ==="
        npm install sharp --force
        
        echo "=== Generating icons ==="
        npx @capacitor/assets generate --android
        
        echo "=== Verifying generated icons ==="
        ls -la android/app/src/main/res/mipmap-*/ic_launcher.png
    
    - name: Fix Android Manifest and Resources
      run: |
        echo "=== Fixing AndroidManifest.xml ==="
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        
        if [ ! -f "$MANIFEST_PATH" ]; then
          echo "❌ ERROR: AndroidManifest.xml not found!"
          exit 1
        fi
        
        echo "=== Current manifest application tag ==="
        grep "application" "$MANIFEST_PATH" | head -1
        
        # Создаем бэкап
        cp "$MANIFEST_PATH" "$MANIFEST_PATH.bak"
        
        # Добавляем атрибуты иконок в application тег
        sed -i 's|<application|<application android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round"|g' "$MANIFEST_PATH"
        
        echo "=== Updated manifest application tag ==="
        grep "application" "$MANIFEST_PATH" | head -1
        
        echo "=== Creating themes.xml to ensure icon is used ==="
        # Создаем themes.xml для правильного отображения иконки
        mkdir -p android/app/src/main/res/values
        cat > android/app/src/main/res/values/themes.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
        <item name="android:windowBackground">@color/colorPrimary</item>
        <item name="android:colorPrimary">@color/colorPrimary</item>
        <item name="android:colorPrimaryDark">@color/colorPrimaryDark</item>
        <item name="android:colorAccent">@color/colorAccent</item>
    </style>
</resources>
EOF
        
        echo "=== Creating colors.xml ==="
        cat > android/app/src/main/res/values/colors.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="colorPrimary">#3F51B5</color>
    <color name="colorPrimaryDark">#303F9F</color>
    <color name="colorAccent">#FF4081</color>
</resources>
EOF
        
        echo "=== Creating Android 12+ splash screen config ==="
        mkdir -p android/app/src/main/res/values-v31
        cat > android/app/src/main/res/values-v31/themes.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
        <item name="android:windowBackground">@color/colorPrimary</item>
        <item name="android:colorPrimary">@color/colorPrimary</item>
        <item name="android:colorPrimaryDark">@color/colorPrimaryDark</item>
        <item name="android:colorAccent">@color/colorAccent</item>
    </style>
</resources>
EOF
    
    - name: Create Capacitor Assets Configuration
      run: |
        echo "=== Creating capacitor-assets.json for better icon generation ==="
        cat > capacitor-assets.json << 'EOF'
{
  "assets": {
    "icon": {
      "android": {
        "dpi": {
          "ldpi": { "width": 36, "height": 36 },
          "mdpi": { "width": 48, "height": 48 },
          "hdpi": { "width": 72, "height": 72 },
          "xhdpi": { "width": 96, "height": 96 },
          "xxhdpi": { "width": 144, "height": 144 },
          "xxxhdpi": { "width": 192, "height": 192 }
        }
      }
    }
  }
}
EOF
        
        echo "=== Regenerating icons with explicit config ==="
        npx @capacitor/assets generate --android --assetPath ./capacitor-assets.json
        
        echo "=== Verifying final icons ==="
        find android/app/src/main/res -name "ic_launcher*.png" | sort
    
    - name: Sync Capacitor
      run: |
        npx cap sync android
    
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace

    - name: Sign Release APK Manually
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      run: |
        echo "=== Decoding Keystore ==="
        echo "$KEYSTORE_BASE64" | base64 --decode > release-key.jks
        
        echo "=== Aligning APK ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk ready-aligned.apk
        
        echo "=== Signing APK ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign \
          --ks release-key.jks \
          --ks-pass pass:"$KEYSTORE_PASSWORD" \
          --key-pass pass:"$KEYSTORE_PASSWORD" \
          --ks-key-alias "$KEY_ALIAS" \
          --out chromium-e621-app.apk ready-aligned.apk
        
        echo "=== Verifying signature ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner verify chromium-e621-app.apk
    
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: chromium-e621-release-apk
        path: chromium-e621-app.apk
        retention-days: 30
