name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;34.0.0'
    
    - name: Clean npm cache and install dependencies
      run: |
        echo "=== Cleaning npm cache ==="
        npm cache clean --force
        rm -rf node_modules package-lock.json
        
        echo "=== Installing dependencies ==="
        npm install --no-package-lock --legacy-peer-deps
        
        echo "=== Installing Capacitor ==="
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets --no-package-lock --legacy-peer-deps
    
    - name: Remove existing Android folder
      run: |
        echo "=== Removing existing android folder ==="
        rm -rf android
    
    - name: Initialize Capacitor
      run: |
        npx cap init "Chromium E621" "com.chromium.e621.client" --web-dir=www
        npx cap add android
    
    - name: Generate icons
      run: |
        echo "=== Preparing icons ==="
        mkdir -p assets
        
        if [ -f "assets/icon-512.png" ]; then
          cp assets/icon-512.png assets/icon-only.png
          echo "✅ Found assets/icon-512.png"
        elif [ -f "icon-512.png" ]; then
          cp icon-512.png assets/icon-only.png
          echo "✅ Found icon-512.png"
        else
          echo "❌ No icon found!"
          exit 1
        fi
        
        echo "=== Installing sharp ==="
        npm install sharp --no-package-lock --legacy-peer-deps
        
        echo "=== Generating Android icons ==="
        npx @capacitor/assets generate --android
        
        echo "=== Verifying icons ==="
        ls -la android/app/src/main/res/mipmap-*/ic_launcher.png || echo "Icons generated"
    
    - name: Fix Android Manifest
      run: |
        echo "=== Fixing AndroidManifest.xml ==="
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        
        if [ ! -f "$MANIFEST" ]; then
          echo "❌ Manifest not found!"
          exit 1
        fi
        
        echo "=== Original manifest ==="
        cat "$MANIFEST"
        
        # Проверяем, есть ли уже атрибуты иконок
        if grep -q 'android:icon=' "$MANIFEST"; then
          echo "✅ android:icon already exists, skipping"
        else
          # Если атрибутов нет, добавляем их после <application
          sed -i 's|<application>|<application android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round">|g' "$MANIFEST"
        fi
        
        echo "=== Updated manifest ==="
        cat "$MANIFEST"
    
    - name: Sync Capacitor
      run: |
        npx cap sync android
    
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace

    - name: Sign Release APK
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      run: |
        echo "=== Decoding Keystore ==="
        echo "$KEYSTORE_BASE64" | base64 --decode > release-key.jks
        
        echo "=== Aligning APK ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk
        
        echo "=== Signing APK ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign \
          --ks release-key.jks \
          --ks-pass pass:"$KEYSTORE_PASSWORD" \
          --key-pass pass:"$KEYSTORE_PASSWORD" \
          --ks-key-alias "$KEY_ALIAS" \
          --out chromium-e621-app.apk aligned.apk
        
        echo "=== Verifying signature ==="
        /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner verify chromium-e621-app.apk
    
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: chromium-e621-release-apk
        path: chromium-e621-app.apk
        retention-days: 30
