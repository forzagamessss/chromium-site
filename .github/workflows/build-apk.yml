name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Clean install dependencies
      run: |
        echo "=== Removing old node_modules ==="
        rm -rf node_modules package-lock.json
        echo "=== Installing dependencies ==="
        npm install --force
      shell: bash
    
    - name: Install Capacitor & Assets tool
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets --force
    
    - name: Remove existing Android folder
      run: |
        echo "=== Removing existing android folder to avoid conflicts ==="
        rm -rf android
    
    - name: Initialize and Build Android Project
      run: |
        npx cap init "Chromium E621" "com.chromium.e621.client" --web-dir=www
        npx cap add android
        
    # --- ТЕПЕРЬ ГЕНЕРИРУЕМ ИКОНКИ (Строго ПОСЛЕ создания папки android) ---
    - name: Generate App Icons
      run: |
        echo "=== Checking for icon source ==="
        if [ ! -f "icon-512.png" ]; then
          echo "⚠️ icon-512.png not found in root, trying to look into assets..."
          if [ -f "assets/icon-512.png" ]; then
            cp assets/icon-512.png ./icon-512.png
          elif [ -f "assets/icon.png" ]; then
            cp assets/icon.png ./icon-512.png
          fi
        fi
        
        echo "=== Generating icons via Capacitor Assets ==="
        # Инструмент автоматически нарежет icon-512.png во все mipmap-папки
        npx capacitor-assets generate --android
    # ----------------------------------------------------------------------

    - name: Sync Capacitor
      run: |
        npx cap sync android
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: chromium-e621-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
