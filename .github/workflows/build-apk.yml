name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.3.0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4.4.0
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4.9.0
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.3.0
    
    - name: Install dependencies with verbose logging
      run: |
        echo "=== Node version ==="
        node --version
        echo "=== NPM version ==="
        npm --version
        echo "=== Current directory ==="
        pwd
        echo "=== Directory contents ==="
        ls -la
        echo "=== Checking package.json ==="
        cat package.json
        echo "=== Checking package-lock.json ==="
        cat package-lock.json || echo "package-lock.json not found"
        echo "=== Installing dependencies ==="
        npm install --verbose --loglevel=info
      shell: bash
    
    - name: Install Capacitor
      run: npm install @capacitor/core @capacitor/cli @capacitor/android
    
    - name: Build Android project
      run: |
        npx cap init "Chromium E621" "com.chromium.e621.client" --web-dir=www
        npx cap add android
        npx cap sync android
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4.6.2
      with:
        name: chromium-e621-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
